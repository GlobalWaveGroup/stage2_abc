<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>v32 | Real-time Merge Visualization</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a14; color: #eee; font-family: 'Consolas','Courier New',monospace; font-size: 13px; overflow: hidden; }

.top {
  background: #12121f; padding: 4px 10px; border-bottom: 1px solid #252540;
  display: flex; justify-content: space-between; align-items: center;
}
.controls {
  display: flex; align-items: center; gap: 6px; padding: 4px 10px;
  background: #0e0e1a; border-bottom: 1px solid #1a1a30; flex-wrap: wrap;
  min-height: 32px;
}
.ctrl-group {
  display: flex; align-items: center; gap: 3px;
  padding: 0 6px; border-right: 1px solid #252540;
  flex-shrink: 0;
}
.ctrl-group:last-child { border-right: none; }

.btn {
  background: #22224a; color: #aac; border: 1px solid #335;
  padding: 5px 10px; border-radius: 3px; cursor: pointer;
  font-size: 12px; font-family: inherit; min-width: 32px; text-align: center;
  flex-shrink: 0;
}
.btn:hover { background: #33336a; }
.btn.on { background: #335588; color: #fff; border-color: #4477aa; }
.btn.off { background: #1a1a2a; color: #666; border-color: #252540; }

input[type=range] { height: 16px; cursor: pointer; }
input[type=number] {
  background: #181830; color: #ccd; border: 1px solid #335;
  padding: 3px 5px; width: 60px; font-family: inherit; font-size: 12px;
  border-radius: 2px; text-align: center;
}
label { color: #99a; font-size: 12px; }

#mainCanvas { width: 100%; display: block; background: #0d0d18; }
#infoBar {
  background: #12121f; padding: 3px 10px; border-top: 1px solid #252540;
  min-height: 18px; color: #778; font-size: 10px;
}
#statusDot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
.dot-ok { background: #4a4; }
.dot-wait { background: #aa4; }
.dot-err { background: #a44; }

.slider-box {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 11px; padding: 0 4px;
}
.slider-box input[type=range] { width: 70px; height: 14px; }
.slider-box span { min-width: 20px; }
</style>
</head><body>

<meta name="viewport" content="width=device-width, initial-scale=1">
<div class="top">
  <span>v32 | EURUSD H1 | Real-time Merge Engine</span>
  <span id="titleInfo" style="color:#556"></span>
</div>

<div class="controls">
  <!-- Navigation -->
  <div class="ctrl-group">
    <button class="btn" onclick="step(-10)" title="Back 10">&laquo;</button>
    <button class="btn" onclick="step(-1)" title="Back 1 (ArrowLeft)">&lsaquo;</button>
    <button class="btn" id="playBtn" onclick="togglePlay()" title="Play/Pause (Space)">&#9654;</button>
    <button class="btn" onclick="step(1)" title="Forward 1 (ArrowRight)">&rsaquo;</button>
    <button class="btn" onclick="step(10)" title="Forward 10">&raquo;</button>
  </div>

  <!-- Position -->
  <div class="ctrl-group">
    <label>Pos:</label>
    <input type="range" id="posSlider" min="10" max="5000" value="100"
           style="width:200px" oninput="onPosSlider(this.value)">
    <input type="number" id="posInput" value="100" min="10" max="5000"
           onchange="onPosInput(this.value)">
  </div>

  <!-- Window -->
  <div class="ctrl-group">
    <label>Win:</label>
    <input type="range" id="winSlider" min="10" max="1000" value="25"
           style="width:100px" oninput="onWinSlider(this.value)">
    <input type="number" id="winInput" value="25" min="10" max="1000"
           onchange="onWinInput(this.value)">
  </div>

  <!-- Speed -->
  <div class="ctrl-group">
    <label>Spd:</label>
    <input type="range" id="spdSlider" min="1" max="20" value="3"
           style="width:50px" oninput="playSpeed=parseInt(this.value)">
  </div>

  <!-- Toggles -->
  <div class="ctrl-group">
    <button class="btn on"  id="tL0"    onclick="toggle('showL0',this)">L0</button>
    <button class="btn on"  id="tAmp"   onclick="toggle('showAmp',this)">Amp</button>
    <button class="btn off" id="tLat"   onclick="toggle('showLat',this)">Lat</button>
    <button class="btn off" id="tExtra" onclick="toggle('showExtra',this)">Extra</button>
    <button class="btn off" id="tFus"   onclick="toggle('showFus',this)">Fus</button>
    <button class="btn off" id="tSym"   onclick="toggle('showSym',this)">Sym</button>
    <button class="btn off" id="tPred"  onclick="toggle('showPred',this)">Pred</button>
    <button class="btn off" id="tPvt"   onclick="toggle('showPvt',this)">Pvt</button>
  </div>

  <!-- Sliders: Peaks/Valleys/MinImp -->
  <div class="ctrl-group">
    <span class="slider-box" style="color:#f88;">
      Pk:<input type="range" id="peakSlider" min="0" max="50" value="10"
           oninput="peakN=parseInt(this.value);document.getElementById('peakVal').textContent=this.value;requestData()">
      <span id="peakVal">10</span>
    </span>
    <span class="slider-box" style="color:#8f8;">
      Vl:<input type="range" id="valleySlider" min="0" max="50" value="10"
           oninput="valleyN=parseInt(this.value);document.getElementById('valleyVal').textContent=this.value;requestData()">
      <span id="valleyVal">10</span>
    </span>
    <span class="slider-box" style="color:#ffa;">
      Imp:<input type="range" id="impSlider" min="0" max="100" value="0"
           oninput="minImp=parseInt(this.value)/100;document.getElementById('impVal').textContent=minImp.toFixed(2);requestData()">
      <span id="impVal">0.00</span>
    </span>
  </div>
</div>

<canvas id="mainCanvas"></canvas>
<div id="infoBar"><span id="statusDot" class="dot-wait"></span>Connecting...</div>

<script>
// ============================================================
// State
// ============================================================
let endBar = 100;
let winSize = 25;
let playSpeed = 3;
let playing = false;
let playTimer = null;
let totalBars = 5000;

// Toggle states
let showL0 = true, showAmp = true, showLat = false;
let showExtra = false, showFus = false, showSym = false;
let showPred = false, showPvt = false;

// Slider states
let peakN = 10, valleyN = 10, minImp = 0;

// Current data from server
let curData = null;
let pendingRequest = false;
let wsReady = false;

// Hover state
let hoverInfo = '';
let lastStartBar = 0, lastPMn = 0, lastPMx = 0, lastDispRange = 1;
let lastMg = { l: 60, r: 12, t: 14, b: 14 };
let lastW = 0, lastH = 0;
let lastXS = null, lastYS = null;

// ============================================================
// WebSocket
// ============================================================
let ws = null;
let reconnectTimer = null;

function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);
    
    ws.onopen = () => {
        wsReady = true;
        setStatus('ok', 'Connected');
        requestData();
    };
    
    ws.onmessage = (e) => {
        pendingRequest = false;
        curData = JSON.parse(e.data);
        totalBars = curData.total_bars;
        
        // Update slider max
        document.getElementById('posSlider').max = totalBars;
        document.getElementById('posInput').max = totalBars;
        
        setStatus('ok', `${curData.compute_ms}ms`);
        draw();
    };
    
    ws.onclose = () => {
        wsReady = false;
        setStatus('err', 'Disconnected');
        reconnectTimer = setTimeout(connectWS, 2000);
    };
    
    ws.onerror = () => {
        setStatus('err', 'Error');
    };
}

function requestData() {
    if (!wsReady || pendingRequest) return;
    pendingRequest = true;
    setStatus('wait', 'Computing...');
    
    ws.send(JSON.stringify({
        end_bar: endBar,
        window: winSize,
        show_lat: showLat,
        show_fusion: showFus,
        show_pred: showPred,
        show_pvt: showPvt,
        show_sym: showSym,
        show_extra: showExtra,
        min_imp: minImp,
        peak_n: peakN,
        valley_n: valleyN,
    }));
}

function setStatus(type, text) {
    const dot = document.getElementById('statusDot');
    dot.className = 'dot-' + type;
}

// ============================================================
// Controls
// ============================================================
function step(delta) {
    endBar = Math.max(winSize, Math.min(endBar + delta, totalBars));
    syncPosUI();
    requestData();
}

function onPosSlider(v) {
    endBar = Math.max(winSize, Math.min(parseInt(v), totalBars));
    document.getElementById('posInput').value = endBar;
    requestData();
}

function onPosInput(v) {
    endBar = Math.max(winSize, Math.min(parseInt(v) || winSize, totalBars));
    document.getElementById('posSlider').value = endBar;
    document.getElementById('posInput').value = endBar;
    requestData();
}

function onWinSlider(v) {
    winSize = Math.max(10, Math.min(parseInt(v), 1000));
    document.getElementById('winInput').value = winSize;
    if (endBar < winSize) { endBar = winSize; syncPosUI(); }
    document.getElementById('posSlider').min = winSize;
    requestData();
}

function onWinInput(v) {
    winSize = Math.max(10, Math.min(parseInt(v) || 25, 1000));
    document.getElementById('winSlider').value = winSize;
    document.getElementById('winInput').value = winSize;
    if (endBar < winSize) { endBar = winSize; syncPosUI(); }
    document.getElementById('posSlider').min = winSize;
    requestData();
}

function syncPosUI() {
    document.getElementById('posSlider').value = endBar;
    document.getElementById('posInput').value = endBar;
}

function toggle(varName, btn) {
    window[varName] = !window[varName];
    btn.classList.toggle('on', window[varName]);
    btn.classList.toggle('off', !window[varName]);
    requestData();
}

function togglePlay() {
    playing = !playing;
    document.getElementById('playBtn').innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
    if (playing) {
        playTimer = setInterval(() => {
            step(playSpeed);
            if (endBar >= totalBars) {
                playing = false;
                clearInterval(playTimer);
                document.getElementById('playBtn').innerHTML = '&#9654;';
            }
        }, 80);
    } else {
        clearInterval(playTimer);
    }
}

// Keyboard
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight') { e.preventDefault(); step(e.shiftKey ? 10 : 1); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); step(e.shiftKey ? -10 : -1); }
    else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
    else if (e.key === '[') { onWinSlider(winSize - 5); document.getElementById('winSlider').value = winSize; }
    else if (e.key === ']') { onWinSlider(winSize + 5); document.getElementById('winSlider').value = winSize; }
});

// ============================================================
// Drawing
// ============================================================

// Amp level colors: A1-A7
const AMP_COLORS = [
    { r:255, g:80,  b:20  },  // A1 orange-red
    { r:255, g:110, b:30  },  // A2
    { r:255, g:140, b:40  },  // A3
    { r:255, g:165, b:50  },  // A4
    { r:240, g:180, b:60  },  // A5
    { r:230, g:195, b:70  },  // A6
    { r:220, g:210, b:80  },  // A7+
];

function draw() {
    if (!curData) return;
    
    const cv = document.getElementById('mainCanvas');
    const dpr = window.devicePixelRatio || 1;
    const cw = window.innerWidth;
    const ch = window.innerHeight - 90;
    const W = cw, H = Math.max(ch, 300);
    
    cv.width = W * dpr;
    cv.height = H * dpr;
    cv.style.width = W + 'px';
    cv.style.height = H + 'px';
    const cx = cv.getContext('2d');
    cx.scale(dpr, dpr);
    
    const mg = { l: 60, r: 12, t: 14, b: 14 };
    const pw = W - mg.l - mg.r;
    const ph = H - mg.t - mg.b;
    
    const d = curData;
    const startBar = d.start_bar;
    const klines = d.klines;
    const n = klines.length;
    if (n === 0) return;
    
    // Price range
    let pMn = Infinity, pMx = -Infinity;
    for (let i = 0; i < n; i++) {
        pMn = Math.min(pMn, klines[i][2]);
        pMx = Math.max(pMx, klines[i][1]);
    }
    // Expand for predictions
    if (d.predictions) {
        for (const p of d.predictions) {
            pMn = Math.min(pMn, p.ptp, p.psp);
            pMx = Math.max(pMx, p.ptp, p.psp);
            if (p.pa) {
                const arcMax = p.psp + p.pd * p.pa * 1.2;
                pMn = Math.min(pMn, arcMax, p.psp);
                pMx = Math.max(pMx, arcMax, p.psp);
            }
            if (p.bt && p.bb) {
                for (const pt of p.bt) { pMn = Math.min(pMn, pt[1]); pMx = Math.max(pMx, pt[1]); }
                for (const pt of p.bb) { pMn = Math.min(pMn, pt[1]); pMx = Math.max(pMx, pt[1]); }
            }
        }
    }
    // Expand for symmetry
    if (d.symmetry) {
        for (const s of d.symmetry) {
            pMn = Math.min(pMn, s.pp1, s.pp2, s.pp3, s.pp4);
            pMx = Math.max(pMx, s.pp1, s.pp2, s.pp3, s.pp4);
        }
    }
    if (pMn === Infinity) { pMn = 1.0; pMx = 1.1; }
    const rng = pMx - pMn;
    pMn -= rng * 0.04;
    pMx += rng * 0.04;
    
    // Coordinate transforms
    const dispEnd = startBar + n + Math.round(n * 0.15);
    const dispRange = dispEnd - startBar;
    
    function xS(bar) { return mg.l + ((bar - startBar) / dispRange) * pw; }
    function yS(price) { return mg.t + ph - ((price - pMn) / (pMx - pMn)) * ph; }
    function barFromX(sx) { return startBar + ((sx - mg.l) / pw) * dispRange; }
    function priceFromY(sy) { return pMn + (1 - (sy - mg.t) / ph) * (pMx - pMn); }
    
    lastStartBar = startBar; lastPMn = pMn; lastPMx = pMx;
    lastDispRange = dispRange; lastMg = mg; lastW = W; lastH = H;
    lastXS = xS; lastYS = yS;
    
    // === Background ===
    cx.fillStyle = '#0d0d18';
    cx.fillRect(0, 0, W, H);
    const futX = xS(d.end_bar);
    if (futX < W - mg.r) {
        cx.fillStyle = '#10101f';
        cx.fillRect(futX, mg.t, W - mg.r - futX, ph);
    }
    
    // === Grid ===
    cx.fillStyle = '#445';
    cx.font = '9px monospace';
    cx.strokeStyle = '#161625';
    cx.lineWidth = 0.5;
    const gridSteps = 6;
    for (let i = 0; i <= gridSteps; i++) {
        const p = pMn + (pMx - pMn) * i / gridSteps;
        const y = yS(p);
        cx.beginPath(); cx.moveTo(mg.l, y); cx.lineTo(W - mg.r, y); cx.stroke();
        cx.fillText(p.toFixed(4), 2, y + 3);
    }
    
    // === K-lines ===
    const bw = Math.max(1.2, pw / dispRange * 0.6);
    for (let i = 0; i < n; i++) {
        const k = klines[i];
        const bar = startBar + i;
        const x = xS(bar);
        const up = k[3] >= k[0];
        cx.strokeStyle = up ? '#1a6a2a' : '#6a1a2a';
        cx.lineWidth = 0.7;
        cx.beginPath(); cx.moveTo(x, yS(k[2])); cx.lineTo(x, yS(k[1])); cx.stroke();
        cx.fillStyle = up ? '#1a4a1a66' : '#4a1a1a66';
        const oY = yS(Math.max(k[0], k[3]));
        const cY = yS(Math.min(k[0], k[3]));
        cx.fillRect(x - bw / 2, oY, bw, Math.max(1, cY - oY));
    }
    
    // === L0 Base Zigzag ===
    if (showL0 && d.snapshots) {
        for (const snap of d.snapshots) {
            if (snap.type !== 'base') continue;
            const pts = snap.pts;
            if (pts.length < 2) continue;
            cx.strokeStyle = 'rgba(255,215,0,0.18)';
            cx.lineWidth = 0.6;
            cx.setLineDash([]);
            cx.beginPath();
            let started = false;
            for (const pt of pts) {
                const x = xS(pt[0]), y = yS(pt[1]);
                if (!started) { cx.moveTo(x, y); started = true; }
                else cx.lineTo(x, y);
            }
            cx.stroke();
        }
    }
    
    // === A1-A6 Amplitude Merge ===
    if (showAmp && d.snapshots) {
        let ampIdx = 0;
        for (const snap of d.snapshots) {
            if (snap.type !== 'amp') continue;
            const pts = snap.pts;
            if (pts.length < 2) continue;
            
            const ci = Math.min(ampIdx, AMP_COLORS.length - 1);
            const c = AMP_COLORS[ci];
            const alpha = Math.min(0.95, 0.50 + ampIdx * 0.09);
            const lw = Math.min(5.0, 2.0 + ampIdx * 0.6);
            
            cx.strokeStyle = `rgba(${c.r},${c.g},${c.b},${alpha})`;
            cx.lineWidth = lw;
            cx.setLineDash([]);
            cx.beginPath();
            let started = false;
            for (const pt of pts) {
                const x = xS(pt[0]), y = yS(pt[1]);
                if (!started) { cx.moveTo(x, y); started = true; }
                else cx.lineTo(x, y);
            }
            cx.stroke();
            
            const markerR = Math.min(5, 2.5 + ampIdx * 0.5);
            cx.fillStyle = `rgba(${c.r},${c.g},${c.b},${alpha})`;
            for (const pt of pts) {
                cx.beginPath();
                cx.arc(xS(pt[0]), yS(pt[1]), markerR, 0, Math.PI * 2);
                cx.fill();
                if (ampIdx >= 2) {
                    cx.strokeStyle = `rgba(255,255,255,${alpha * 0.3})`;
                    cx.lineWidth = 0.7;
                    cx.stroke();
                }
            }
            
            if (pts.length > 0) {
                const last = pts[pts.length - 1];
                cx.fillStyle = `rgba(${c.r},${c.g},${c.b},${alpha * 0.8})`;
                cx.font = '9px monospace';
                cx.textAlign = 'left';
                cx.fillText(snap.label, xS(last[0]) + markerR + 2, yS(last[1]) + 3);
            }
            
            ampIdx++;
        }
    }
    
    // === T1-T2 Lateral Merge ===
    if (showLat && d.snapshots) {
        let latIdx = 0;
        for (const snap of d.snapshots) {
            if (snap.type !== 'lat') continue;
            const pts = snap.pts;
            if (pts.length < 2) continue;
            
            const alpha = Math.min(0.95, 0.75 + latIdx * 0.10);
            const lw = 2.5 + latIdx * 0.8;
            cx.strokeStyle = `rgba(0,220,255,${alpha})`;
            cx.lineWidth = lw;
            cx.setLineDash([10 + latIdx * 2, 4]);
            
            cx.beginPath();
            let started = false;
            for (const pt of pts) {
                const x = xS(pt[0]), y = yS(pt[1]);
                if (!started) { cx.moveTo(x, y); started = true; }
                else cx.lineTo(x, y);
            }
            cx.stroke();
            
            const sz = 5 + latIdx * 1.5;
            cx.fillStyle = `rgba(0,220,255,${alpha})`;
            cx.strokeStyle = `rgba(255,255,255,${alpha * 0.5})`;
            cx.lineWidth = 0.8;
            for (const pt of pts) {
                const x = xS(pt[0]), y = yS(pt[1]);
                cx.beginPath();
                cx.moveTo(x, y - sz); cx.lineTo(x + sz, y);
                cx.lineTo(x, y + sz); cx.lineTo(x - sz, y);
                cx.closePath(); cx.fill(); cx.stroke();
            }
            
            if (pts.length > 0) {
                const last = pts[pts.length - 1];
                cx.fillStyle = `rgba(0,220,255,${alpha})`;
                cx.font = '10px monospace';
                cx.textAlign = 'left';
                cx.fillText(snap.label, xS(last[0]) + sz + 3, yS(last[1]) + 3);
            }
            
            latIdx++;
        }
    }
    cx.setLineDash([]);
    
    // === Extra segments (greedy-skipped) ===
    if (showExtra && d.extra) {
        for (let gi = 0; gi < d.extra.length; gi++) {
            const g = d.extra[gi];
            const isLat = g.label.includes('_mid');
            const t = gi / Math.max(d.extra.length - 1, 1);
            let color;
            if (isLat) {
                color = `rgb(${Math.round(80+t*40)},${Math.round(220-t*60)},${Math.round(120+t*40)})`;
            } else {
                color = `rgb(${Math.round(255-t*40)},${Math.round(160-t*60)},60)`;
            }
            
            cx.strokeStyle = color;
            cx.lineWidth = isLat ? 1.0 : 0.8;
            cx.globalAlpha = 0.5;
            cx.setLineDash(isLat ? [4, 3] : [6, 2]);
            
            for (const seg of g.segs) {
                cx.beginPath();
                cx.moveTo(xS(seg.b1), yS(seg.p1));
                cx.lineTo(xS(seg.b2), yS(seg.p2));
                cx.stroke();
            }
        }
        cx.setLineDash([]); cx.globalAlpha = 1;
    }
    
    // === Fusion Pool ===
    if (showFus && d.pool) {
        for (const s of d.pool) {
            const isFusion = s.src === 'f';
            if (isFusion) {
                const fc = s.dr === 1 ? 'rgba(60,220,160,0.55)' : 'rgba(220,80,120,0.55)';
                cx.strokeStyle = fc;
                cx.lineWidth = 1.8;
                cx.setLineDash([10, 5]);
                cx.beginPath();
                cx.moveTo(xS(s.bs), yS(s.ps));
                cx.lineTo(xS(s.be), yS(s.pe));
                cx.stroke();
                cx.fillStyle = fc;
                cx.beginPath(); cx.arc(xS(s.bs), yS(s.ps), 2.5, 0, Math.PI * 2); cx.fill();
                cx.beginPath(); cx.arc(xS(s.be), yS(s.pe), 2.5, 0, Math.PI * 2); cx.fill();
            } else {
                const isAmp = s.src === 'a';
                const al = isAmp ? 0.25 : 0.12;
                cx.strokeStyle = isAmp ? `rgba(255,160,60,${al})` : `rgba(150,150,180,${al})`;
                cx.lineWidth = isAmp ? 0.8 : 0.4;
                cx.setLineDash([3, 2]);
                cx.beginPath();
                cx.moveTo(xS(s.bs), yS(s.ps));
                cx.lineTo(xS(s.be), yS(s.pe));
                cx.stroke();
            }
        }
    }
    cx.setLineDash([]);
    
    // === Symmetry Structures (A-B-C three-wave) ===
    if (showSym && d.symmetry) {
        const syms = d.symmetry;
        const nSym = syms.length;
        for (let i = nSym - 1; i >= 0; i--) {
            const s = syms[i];
            const t = i / Math.max(nSym - 1, 1);
            const alpha = Math.max(0.2, 0.85 - t * 0.6);
            const lw = Math.max(1.0, 3.5 - t * 2.5);
            
            // A segment: p1->p2 (colored by direction)
            const gA = s.dr === 1 ? `rgba(80,255,120,${alpha})` : `rgba(255,120,80,${alpha})`;
            cx.strokeStyle = gA;
            cx.lineWidth = lw;
            cx.setLineDash([]);
            cx.beginPath();
            cx.moveTo(xS(s.p1), yS(s.pp1));
            cx.lineTo(xS(s.p2), yS(s.pp2));
            cx.stroke();
            
            // B segment: p2->p3 (gray dashed)
            cx.strokeStyle = `rgba(180,180,180,${alpha * 0.6})`;
            cx.lineWidth = lw * 0.6;
            cx.setLineDash([4, 3]);
            cx.beginPath();
            cx.moveTo(xS(s.p2), yS(s.pp2));
            cx.lineTo(xS(s.p3), yS(s.pp3));
            cx.stroke();
            
            // C segment: p3->p4 (same color as A, dashed)
            cx.strokeStyle = gA;
            cx.lineWidth = lw;
            cx.setLineDash([6, 3]);
            cx.beginPath();
            cx.moveTo(xS(s.p3), yS(s.pp3));
            cx.lineTo(xS(s.p4), yS(s.pp4));
            cx.stroke();
            
            // Axis/center diamond marker + score label (top 10)
            if (i < 10) {
                const midBar = (s.p2 + s.p3) / 2;
                const midPrice = (s.pp2 + s.pp3) / 2;
                // Diamond marker
                cx.fillStyle = `rgba(255,255,100,${alpha * 0.6})`;
                cx.strokeStyle = `rgba(255,255,100,${alpha * 0.3})`;
                cx.lineWidth = 0.5;
                cx.setLineDash([]);
                const dsz = 4;
                cx.beginPath();
                cx.moveTo(xS(midBar), yS(midPrice) - dsz);
                cx.lineTo(xS(midBar) + dsz, yS(midPrice));
                cx.lineTo(xS(midBar), yS(midPrice) + dsz);
                cx.lineTo(xS(midBar) - dsz, yS(midPrice));
                cx.closePath();
                cx.fill(); cx.stroke();
                
                // Score label
                cx.fillStyle = `rgba(200,255,100,${alpha})`;
                cx.font = '9px monospace';
                cx.textAlign = 'center';
                cx.fillText(`S${i+1} ${s.sym.toFixed(2)}`, xS(midBar), yS(midPrice) - 7);
                cx.textAlign = 'start';
            }
        }
        cx.setLineDash([]); cx.globalAlpha = 1;
    }
    
    // === Important Pivots (separate peaks/valleys with slider control) ===
    if (showPvt && d.pivots) {
        const peaks = d.pivots.peaks || [];
        const valleys = d.pivots.valleys || [];
        
        // Find max importance for normalization
        let maxImp = 0;
        for (const pv of peaks) maxImp = Math.max(maxImp, pv.imp);
        for (const pv of valleys) maxImp = Math.max(maxImp, pv.imp);
        
        cx.textAlign = 'center';
        
        // Draw peaks
        for (let i = 0; i < peaks.length; i++) {
            const pv = peaks[i];
            if (pv.b < startBar || pv.b > d.end_bar) continue;
            const x = xS(pv.b), y = yS(pv.p);
            const normImp = maxImp > 0 ? pv.imp / maxImp : 0.5;
            const r = Math.max(3, 6 - i * 0.3);
            const alpha = Math.max(0.4, 1.0 - i * 0.03);
            
            cx.fillStyle = `rgba(255,68,68,${alpha})`;
            cx.globalAlpha = alpha;
            cx.beginPath(); cx.arc(x, y, r, 0, Math.PI * 2); cx.fill();
            cx.strokeStyle = '#fff';
            cx.lineWidth = i < 5 ? 1.2 : 0.6;
            cx.stroke();
            
            // Label
            cx.fillStyle = `rgba(255,68,68,${alpha})`;
            cx.font = i < 10 ? 'bold 11px monospace' : '10px monospace';
            cx.fillText(`H${i+1}`, x, y - 14);
            
            // Importance value
            if (normImp > 0.3) {
                cx.font = '9px monospace';
                cx.fillStyle = `rgba(255,170,170,${alpha})`;
                cx.fillText(pv.imp.toFixed(3), x, y - 25);
            }
            
            // Vertical guide
            cx.strokeStyle = `rgba(255,68,68,0.3)`;
            cx.lineWidth = 0.5;
            cx.beginPath(); cx.moveTo(x, y); cx.lineTo(x, y - 8); cx.stroke();
            cx.globalAlpha = 1;
        }
        
        // Draw valleys
        for (let i = 0; i < valleys.length; i++) {
            const pv = valleys[i];
            if (pv.b < startBar || pv.b > d.end_bar) continue;
            const x = xS(pv.b), y = yS(pv.p);
            const normImp = maxImp > 0 ? pv.imp / maxImp : 0.5;
            const r = Math.max(3, 6 - i * 0.3);
            const alpha = Math.max(0.4, 1.0 - i * 0.03);
            
            cx.fillStyle = `rgba(68,255,68,${alpha})`;
            cx.globalAlpha = alpha;
            cx.beginPath(); cx.arc(x, y, r, 0, Math.PI * 2); cx.fill();
            cx.strokeStyle = '#fff';
            cx.lineWidth = i < 5 ? 1.2 : 0.6;
            cx.stroke();
            
            cx.fillStyle = `rgba(68,255,68,${alpha})`;
            cx.font = i < 10 ? 'bold 11px monospace' : '10px monospace';
            cx.fillText(`L${i+1}`, x, y + 16);
            
            if (normImp > 0.3) {
                cx.font = '9px monospace';
                cx.fillStyle = `rgba(170,255,170,${alpha})`;
                cx.fillText(pv.imp.toFixed(3), x, y + 27);
            }
            
            cx.strokeStyle = `rgba(68,255,68,0.3)`;
            cx.lineWidth = 0.5;
            cx.beginPath(); cx.moveTo(x, y); cx.lineTo(x, y + 8); cx.stroke();
            cx.globalAlpha = 1;
        }
        cx.textAlign = 'start';
    }
    
    // === Predictions (4 types: mirror/center/triangle/modonly) ===
    if (showPred && d.predictions) {
        for (let i = 0; i < d.predictions.length; i++) {
            const pr = d.predictions[i];
            const isMirror = pr.tp === 'm';
            const isTriangle = pr.tp === 't';
            const isModOnly = pr.tp === 'o';
            const alpha = Math.max(0.15, 0.75 - i * 0.025);
            const lw = Math.max(0.6, 2.0 - i * 0.06);
            
            // Color scheme per type
            let aCol, pCol, envCol;
            if (isTriangle) {
                const isConv = pr.st === 'c';
                aCol = isConv ? `rgba(240,200,60,${alpha})` : `rgba(200,100,255,${alpha})`;
                pCol = isConv ? `rgba(255,220,80,${alpha})` : `rgba(220,130,255,${alpha})`;
                envCol = isConv ? `rgba(255,220,80,${alpha * 0.10})` : `rgba(220,130,255,${alpha * 0.10})`;
            } else if (isModOnly) {
                aCol = `rgba(60,230,220,${alpha})`;
                pCol = pr.pd === 1 ? `rgba(80,255,200,${alpha})` : `rgba(255,120,160,${alpha})`;
                envCol = pr.pd === 1 ? `rgba(80,255,200,${alpha * 0.12})` : `rgba(255,120,160,${alpha * 0.12})`;
            } else if (isMirror) {
                aCol = `rgba(255,180,60,${alpha})`;
                pCol = pr.pd === 1 ? `rgba(80,255,120,${alpha})` : `rgba(255,80,100,${alpha})`;
                envCol = pr.pd === 1 ? `rgba(80,255,120,${alpha * 0.12})` : `rgba(255,80,100,${alpha * 0.12})`;
            } else {
                // center
                aCol = `rgba(80,200,255,${alpha})`;
                pCol = pr.pd === 1 ? `rgba(80,255,120,${alpha})` : `rgba(255,80,100,${alpha})`;
                envCol = pr.pd === 1 ? `rgba(80,255,120,${alpha * 0.12})` : `rgba(255,80,100,${alpha * 0.12})`;
            }
            
            // --- A segment (solid) ---
            cx.strokeStyle = aCol;
            cx.lineWidth = lw;
            cx.setLineDash([]);
            cx.beginPath();
            cx.moveTo(xS(pr.as), yS(pr.aps));
            cx.lineTo(xS(pr.ae), yS(pr.ape));
            cx.stroke();
            
            // --- B segment (center/triangle/modonly, thin dashed) ---
            if (!isMirror && pr.bs > 0) {
                cx.strokeStyle = `rgba(180,180,200,${alpha * 0.25})`;
                cx.lineWidth = lw * 0.4;
                cx.setLineDash([3, 2]);
                cx.beginPath();
                cx.moveTo(xS(pr.bs), yS(pr.bps));
                cx.lineTo(xS(pr.be), yS(pr.bpe));
                cx.stroke();
            }
            
            // --- Triangle specific ---
            if (isTriangle) {
                cx.setLineDash([]);
                
                // Boundary lines
                if (pr.bt && pr.bb) {
                    const isConv = pr.st === 'c';
                    const bdColor = isConv
                        ? `rgba(240,200,60,${alpha * 0.4})`
                        : `rgba(200,100,255,${alpha * 0.4})`;
                    const bdFill = isConv
                        ? `rgba(240,200,60,${alpha * 0.06})`
                        : `rgba(200,100,255,${alpha * 0.06})`;
                    
                    const extBar = pr.ptb;
                    const topSlope = (pr.bt[1][1] - pr.bt[0][1]) / Math.max(pr.bt[1][0] - pr.bt[0][0], 1);
                    const botSlope = (pr.bb[1][1] - pr.bb[0][1]) / Math.max(pr.bb[1][0] - pr.bb[0][0], 1);
                    const topExt = pr.bt[1][1] + topSlope * (extBar - pr.bt[1][0]);
                    const botExt = pr.bb[1][1] + botSlope * (extBar - pr.bb[1][0]);
                    
                    cx.strokeStyle = bdColor;
                    cx.lineWidth = lw * 0.8;
                    cx.setLineDash([6, 3]);
                    cx.beginPath();
                    cx.moveTo(xS(pr.bt[0][0]), yS(pr.bt[0][1]));
                    cx.lineTo(xS(pr.bt[1][0]), yS(pr.bt[1][1]));
                    cx.lineTo(xS(extBar), yS(topExt));
                    cx.stroke();
                    cx.beginPath();
                    cx.moveTo(xS(pr.bb[0][0]), yS(pr.bb[0][1]));
                    cx.lineTo(xS(pr.bb[1][0]), yS(pr.bb[1][1]));
                    cx.lineTo(xS(extBar), yS(botExt));
                    cx.stroke();
                    
                    cx.fillStyle = bdFill;
                    cx.beginPath();
                    cx.moveTo(xS(pr.bt[0][0]), yS(pr.bt[0][1]));
                    cx.lineTo(xS(pr.bt[1][0]), yS(pr.bt[1][1]));
                    cx.lineTo(xS(extBar), yS(topExt));
                    cx.lineTo(xS(extBar), yS(botExt));
                    cx.lineTo(xS(pr.bb[1][0]), yS(pr.bb[1][1]));
                    cx.lineTo(xS(pr.bb[0][0]), yS(pr.bb[0][1]));
                    cx.closePath();
                    cx.fill();
                }
                
                // Predicted C segment (scaled line + arrowhead)
                cx.strokeStyle = pCol;
                cx.lineWidth = lw * 1.3;
                cx.setLineDash([8, 4]);
                cx.beginPath();
                cx.moveTo(xS(pr.psb), yS(pr.psp));
                cx.lineTo(xS(pr.ptb), yS(pr.ptp));
                cx.stroke();
                
                // FEATURE 3: Arrowhead
                drawArrowhead(cx, xS(pr.psb), yS(pr.psp), xS(pr.ptb), yS(pr.ptp), pCol, alpha);
                
                // FEATURE 4: Target price horizontal line
                drawTargetLine(cx, xS(pr.psb), xS(pr.ptb), yS(pr.ptp), pCol, alpha);
                
                // FEATURE 5: Progress indicator
                if (pr.prog > 0) {
                    drawProgress(cx, pr, xS, yS, alpha, lw);
                }
                
                // Target point marker
                cx.fillStyle = pCol;
                cx.beginPath();
                cx.arc(xS(pr.ptb), yS(pr.ptp), 3, 0, Math.PI * 2);
                cx.fill();
                
                // Label
                if (i < 15) {
                    cx.fillStyle = pCol;
                    cx.font = '8px monospace';
                    cx.textAlign = 'left';
                    const isConv = pr.st === 'c';
                    const label = (isConv ? 'TC' : 'TD') + (i + 1);
                    const ratioStr = ` r=${pr.ar ? pr.ar.toFixed(2) : '?'}`;
                    const progStr = pr.prog > 0 ? ` ${(pr.prog*100).toFixed(0)}%` : '';
                    cx.fillText(label + ratioStr + progStr, xS(pr.ptb) + 4, yS(pr.ptp) + 3);
                }
            }
            // --- Arc-based predictions (mirror / center / modonly) ---
            else if (pr.mr > 0 && pr.ga > 0 && pr.gs > 0) {
                const R = pr.mr;
                const ga = pr.ga;
                const gs = pr.gs;
                const dir = pr.pd;
                const startP = pr.psp;
                const startB = pr.psb;
                
                const maxTime = R * gs;
                const nSteps = 30;
                const tMax = Math.min(maxTime, pr.pt * 1.8);
                
                const arcPts = [];
                for (let s = 0; s <= nSteps; s++) {
                    const t = (s / nSteps) * tMax;
                    const nt = t / gs;
                    if (nt >= R) break;
                    const na = Math.sqrt(R * R - nt * nt);
                    const amp = na * ga;
                    const price = startP + dir * amp;
                    const bar = startB + t;
                    arcPts.push({ bar, price, amp });
                }
                
                if (arcPts.length >= 2) {
                    // Arc main line
                    cx.strokeStyle = pCol;
                    cx.lineWidth = lw * 1.3;
                    cx.setLineDash(isModOnly ? [5, 3] : []);
                    cx.beginPath();
                    cx.moveTo(xS(arcPts[0].bar), yS(arcPts[0].price));
                    for (let s = 1; s < arcPts.length; s++) {
                        cx.lineTo(xS(arcPts[s].bar), yS(arcPts[s].price));
                    }
                    cx.stroke();
                    
                    // FEATURE 3: Arrowhead at end of arc
                    if (arcPts.length >= 2) {
                        const last = arcPts[arcPts.length - 1];
                        const prev = arcPts[arcPts.length - 2];
                        drawArrowhead(cx, xS(prev.bar), yS(prev.price), xS(last.bar), yS(last.price), pCol, alpha);
                    }
                    
                    // FEATURE 4: Target price horizontal line
                    if (pr.pt > 0 && pr.pt <= tMax) {
                        const nt_pt = pr.pt / gs;
                        if (nt_pt < R) {
                            const na_pt = Math.sqrt(R * R - nt_pt * nt_pt);
                            const price_pt = startP + dir * na_pt * ga;
                            drawTargetLine(cx, xS(startB), xS(startB + pr.pt), yS(price_pt), pCol, alpha);
                        }
                    }
                    
                    // Envelope
                    cx.fillStyle = envCol;
                    cx.beginPath();
                    cx.moveTo(xS(arcPts[0].bar), yS(arcPts[0].price));
                    for (let s = 1; s < arcPts.length; s++) {
                        const t = (s / nSteps) * tMax;
                        const envR = arcPts[s].amp * Math.sqrt(t / Math.max(tMax, 1)) * 0.4;
                        cx.lineTo(xS(arcPts[s].bar), yS(arcPts[s].price + envR));
                    }
                    for (let s = arcPts.length - 1; s >= 1; s--) {
                        const t = (s / nSteps) * tMax;
                        const envR = arcPts[s].amp * Math.sqrt(t / Math.max(tMax, 1)) * 0.4;
                        cx.lineTo(xS(arcPts[s].bar), yS(arcPts[s].price - envR));
                    }
                    cx.closePath();
                    cx.fill();
                    
                    // Reference straight line (faint)
                    cx.strokeStyle = pCol.replace(/[\d.]+\)$/, (alpha * 0.2).toFixed(2) + ')');
                    cx.lineWidth = 0.5;
                    cx.setLineDash([4, 4]);
                    cx.beginPath();
                    cx.moveTo(xS(pr.psb), yS(pr.psp));
                    cx.lineTo(xS(pr.ptb), yS(pr.ptp));
                    cx.stroke();
                    
                    // pred_time position marker
                    if (pr.pt > 0 && pr.pt <= tMax) {
                        const nt_pt = pr.pt / gs;
                        if (nt_pt < R) {
                            const na_pt = Math.sqrt(R * R - nt_pt * nt_pt);
                            const price_pt = startP + dir * na_pt * ga;
                            const bar_pt = startB + pr.pt;
                            cx.fillStyle = pCol;
                            cx.beginPath();
                            cx.arc(xS(bar_pt), yS(price_pt), 3, 0, Math.PI * 2);
                            cx.fill();
                            cx.strokeStyle = `rgba(255,255,255,${alpha * 0.5})`;
                            cx.lineWidth = 0.6;
                            cx.setLineDash([]);
                            cx.stroke();
                        }
                    }
                    
                    // FEATURE 5: Progress indicator
                    if (pr.prog > 0) {
                        drawProgress(cx, pr, xS, yS, alpha, lw);
                    }
                    
                    // Center/axis diamond marker
                    if (i < 15) {
                        let cxP, cyP;
                        if (isMirror && pr.cb !== undefined) {
                            cxP = xS(pr.cb); cyP = yS(pr.cp);
                        } else if (pr.bs > 0) {
                            cxP = xS((pr.bs + pr.be) / 2); cyP = yS((pr.bps + pr.bpe) / 2);
                        } else {
                            cxP = null;
                        }
                        if (cxP !== null) {
                            cx.fillStyle = isMirror ? `rgba(255,200,80,${alpha})` : `rgba(80,200,255,${alpha})`;
                            cx.beginPath();
                            cx.moveTo(cxP, cyP - 4);
                            cx.lineTo(cxP + 4, cyP);
                            cx.lineTo(cxP, cyP + 4);
                            cx.lineTo(cxP - 4, cyP);
                            cx.closePath();
                            cx.fill();
                        }
                    }
                    
                    // Label
                    if (i < 15) {
                        const lastPt = arcPts[arcPts.length - 1];
                        cx.fillStyle = pCol;
                        cx.font = '8px monospace';
                        cx.textAlign = 'left';
                        const typeLabels = {'m': 'M', 'c': 'C', 'o': 'MO'};
                        const label = (typeLabels[pr.tp] || pr.tp) + (i + 1);
                        const ptLabel = ` R=${pr.mr.toFixed(3)}`;
                        const progStr = pr.prog > 0 ? ` ${(pr.prog*100).toFixed(0)}%` : '';
                        cx.fillText(label + ptLabel + progStr, xS(lastPt.bar) + 3, yS(lastPt.price) + 3);
                    }
                }
            } else {
                // Fallback: straight line
                cx.strokeStyle = pCol;
                cx.lineWidth = lw * 1.3;
                cx.setLineDash([8, 4]);
                cx.beginPath();
                cx.moveTo(xS(pr.psb), yS(pr.psp));
                cx.lineTo(xS(pr.ptb), yS(pr.ptp));
                cx.stroke();
                
                // Arrowhead
                drawArrowhead(cx, xS(pr.psb), yS(pr.psp), xS(pr.ptb), yS(pr.ptp), pCol, alpha);
                // Target line
                drawTargetLine(cx, xS(pr.psb), xS(pr.ptb), yS(pr.ptp), pCol, alpha);
                // Progress
                if (pr.prog > 0) {
                    drawProgress(cx, pr, xS, yS, alpha, lw);
                }
            }
            
            // FEATURE 6: Deviation annotation
            // Show deviation between current K-line and expected prediction path
            if (pr.prog > 0 && pr.prog < 1.0 && i < 10) {
                drawDeviation(cx, pr, d, xS, yS, alpha);
            }
        }
    }
    cx.setLineDash([]);
    cx.textAlign = 'start';
    cx.globalAlpha = 1;
    
    // === Current bar vertical line ===
    cx.strokeStyle = '#ffffff10';
    cx.lineWidth = 1;
    cx.beginPath();
    cx.moveTo(xS(d.end_bar), mg.t);
    cx.lineTo(xS(d.end_bar), H - mg.b);
    cx.stroke();
    
    // === Info bar ===
    updateInfoBar(d);
    
    document.getElementById('titleInfo').textContent =
        `${d.total_bars} bars | Window ${d.window}`;
}

// --- Helper: Draw arrowhead at (x2,y2) pointing from (x1,y1) ---
function drawArrowhead(cx, x1, y1, x2, y2, color, alpha) {
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const arrLen = 8;
    cx.strokeStyle = color;
    cx.lineWidth = 1.5;
    cx.setLineDash([]);
    cx.beginPath();
    cx.moveTo(x2, y2);
    cx.lineTo(x2 - arrLen * Math.cos(angle - 0.4), y2 - arrLen * Math.sin(angle - 0.4));
    cx.moveTo(x2, y2);
    cx.lineTo(x2 - arrLen * Math.cos(angle + 0.4), y2 - arrLen * Math.sin(angle + 0.4));
    cx.stroke();
}

// --- Helper: Draw target price horizontal line ---
function drawTargetLine(cx, x1, x2, yTarget, color, alpha) {
    cx.strokeStyle = color;
    cx.lineWidth = 0.5;
    cx.globalAlpha = alpha * 0.3;
    cx.setLineDash([2, 4]);
    cx.beginPath();
    cx.moveTo(x1, yTarget);
    cx.lineTo(x2, yTarget);
    cx.stroke();
    cx.globalAlpha = 1;
    cx.setLineDash([]);
}

// --- Helper: Draw progress indicator (green solid line showing partial C) ---
function drawProgress(cx, pr, xS, yS, alpha, lw) {
    const progBar = pr.psb + (pr.ptb - pr.psb) * pr.prog;
    const progPrc = pr.psp + (pr.ptp - pr.psp) * pr.prog;
    cx.strokeStyle = `rgba(0,255,120,${alpha})`;
    cx.lineWidth = lw * 1.5;
    cx.setLineDash([]);
    cx.beginPath();
    cx.moveTo(xS(pr.psb), yS(pr.psp));
    cx.lineTo(xS(progBar), yS(progPrc));
    cx.stroke();
}

// --- Helper: Draw deviation annotation ---
function drawDeviation(cx, pr, d, xS, yS, alpha) {
    // Current bar = d.end_bar - 1
    const curBar = d.end_bar - 1;
    if (curBar < pr.psb || curBar > pr.ptb) return;
    
    // Expected price at current bar (linear interpolation on prediction)
    const tRatio = (curBar - pr.psb) / Math.max(pr.ptb - pr.psb, 1);
    const expectedPrice = pr.psp + (pr.ptp - pr.psp) * tRatio;
    
    // Actual price (current K close)
    const kIdx = curBar - d.start_bar;
    if (kIdx < 0 || kIdx >= d.klines.length) return;
    const actualPrice = d.klines[kIdx][3]; // close
    
    const deviation = actualPrice - expectedPrice;
    const devPips = Math.abs(deviation * 10000).toFixed(1);
    const devSign = deviation >= 0 ? '+' : '-';
    
    // Draw deviation line
    cx.strokeStyle = deviation >= 0 ? `rgba(80,255,120,${alpha * 0.6})` : `rgba(255,80,80,${alpha * 0.6})`;
    cx.lineWidth = 0.8;
    cx.setLineDash([2, 2]);
    cx.beginPath();
    cx.moveTo(xS(curBar), yS(expectedPrice));
    cx.lineTo(xS(curBar), yS(actualPrice));
    cx.stroke();
    cx.setLineDash([]);
    
    // Annotation text
    cx.fillStyle = deviation >= 0 ? `rgba(80,255,120,${alpha * 0.8})` : `rgba(255,80,80,${alpha * 0.8})`;
    cx.font = '8px monospace';
    cx.textAlign = 'left';
    cx.fillText(`${devSign}${devPips}p`, xS(curBar) + 3, yS((expectedPrice + actualPrice) / 2) + 3);
}

// === Info bar update ===
function updateInfoBar(d) {
    const n = d.klines.length;
    const lastK = n > 0 ? d.klines[n - 1] : [0, 0, 0, 0];
    const snapLabels = d.snapshots ? d.snapshots.map(s => s.label).join(',') : '';
    const poolN = d.pool ? d.pool.length : 0;
    const extraN = d.extra ? d.extra.reduce((a, g) => a + g.segs.length, 0) : 0;
    const symN = d.symmetry ? d.symmetry.length : 0;
    let predN = 0, predM = 0, predC = 0, predT = 0, predO = 0;
    if (d.predictions) {
        predN = d.predictions.length;
        for (const p of d.predictions) {
            if (p.tp === 'm') predM++;
            else if (p.tp === 'c') predC++;
            else if (p.tp === 't') predT++;
            else if (p.tp === 'o') predO++;
        }
    }
    let pvtStr = '';
    if (d.pivots) {
        const pk = d.pivots.peaks ? d.pivots.peaks.length : 0;
        const vl = d.pivots.valleys ? d.pivots.valleys.length : 0;
        pvtStr = `Pvt:${pk}pk/${vl}vl`;
    }
    
    const hoverStr = hoverInfo ? ` | <span style="color:#ff0">${hoverInfo}</span>` : '';
    document.getElementById('infoBar').innerHTML =
        `<span id="statusDot" class="dot-ok"></span>` +
        `Bar ${d.end_bar} [${d.start_bar}..${d.end_bar}] Win=${d.window} | ` +
        `O:${lastK[0]} H:${lastK[1]} L:${lastK[2]} C:${lastK[3]} | ` +
        `Levels: ${snapLabels} | Extra:${extraN} Pool:${poolN} Sym:${symN} ` +
        `Pred:${predN}(M${predM}/C${predC}/T${predT}/MO${predO}) ${pvtStr} | ` +
        `${d.compute_ms}ms${hoverStr}`;
}

// ============================================================
// Mouse hover interaction (FEATURE 7: enhanced with symmetry 5-dim vector)
// ============================================================
function onCanvasMouseMove(e) {
    if (!curData || !lastXS) return;
    const cv = document.getElementById('mainCanvas');
    const rect = cv.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    
    const d = curData;
    const mg = lastMg;
    const pw = lastW - mg.l - mg.r;
    const ph = lastH - mg.t - mg.b;
    
    const mBar = lastStartBar + ((mx - mg.l) / pw) * lastDispRange;
    const mPrice = lastPMn + (1 - (my - mg.t) / ph) * (lastPMx - lastPMn);
    
    // K-line info
    const kIdx = Math.round(mBar) - d.start_bar;
    let info = `Bar:${Math.round(mBar)} Price:${mPrice.toFixed(5)}`;
    
    if (kIdx >= 0 && kIdx < d.klines.length) {
        const k = d.klines[kIdx];
        info = `Bar:${d.start_bar + kIdx} O:${k[0]} H:${k[1]} L:${k[2]} C:${k[3]}`;
    }
    
    // Nearest pivot
    let nearestPvt = null, nearestPvtDist = Infinity;
    if (showPvt && d.pivots) {
        const allPvts = (d.pivots.peaks || []).concat(d.pivots.valleys || []);
        for (const pv of allPvts) {
            const dx = lastXS(pv.b) - mx;
            const dy = lastYS(pv.p) - my;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < nearestPvtDist && dist < 20) {
                nearestPvtDist = dist;
                nearestPvt = pv;
            }
        }
    }
    if (nearestPvt) {
        info += ` | Pvt: bar=${nearestPvt.b} price=${nearestPvt.p} imp=${nearestPvt.imp}`;
    }
    
    // Nearest symmetry structure (FEATURE 7: with 5-dim vector)
    let nearestSym = null, nearestSymDist = Infinity;
    if (showSym && d.symmetry) {
        for (const s of d.symmetry) {
            const segs = [
                [s.p1, s.pp1, s.p2, s.pp2],
                [s.p2, s.pp2, s.p3, s.pp3],
                [s.p3, s.pp3, s.p4, s.pp4]
            ];
            for (const seg of segs) {
                const x1 = lastXS(seg[0]), y1 = lastYS(seg[1]);
                const x2 = lastXS(seg[2]), y2 = lastYS(seg[3]);
                const dx = x2 - x1, dy = y2 - y1;
                const len2 = dx * dx + dy * dy;
                if (len2 === 0) continue;
                let t = ((mx - x1) * dx + (my - y1) * dy) / len2;
                t = Math.max(0, Math.min(1, t));
                const px = x1 + t * dx, py = y1 + t * dy;
                const dist = Math.sqrt((mx - px) * (mx - px) + (my - py) * (my - py));
                if (dist < nearestSymDist && dist < 20) {
                    nearestSymDist = dist;
                    nearestSym = s;
                }
            }
        }
    }
    if (nearestSym) {
        const s = nearestSym;
        const dirStr = s.dr === 1 ? 'UP' : 'DN';
        info += ` | SYM[${s.tp} ${dirStr}] ${s.p1}->${s.p2}->${s.p3}->${s.p4}` +
                ` score=${s.sc} sym=${s.sym}` +
                ` | amp=${s.va} time=${s.vt} mod=${s.vm} slope=${s.vs} cplx=${s.vc}`;
    }
    
    // Nearest prediction
    let nearestPred = null, nearestPredDist = Infinity;
    if (showPred && d.predictions) {
        for (const pr of d.predictions) {
            for (const [bx, px] of [[pr.as, pr.aps], [pr.ae, pr.ape], [pr.psb, pr.psp], [pr.ptb, pr.ptp]]) {
                const dx = lastXS(bx) - mx;
                const dy = lastYS(px) - my;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < nearestPredDist && dist < 30) {
                    nearestPredDist = dist;
                    nearestPred = pr;
                }
            }
        }
    }
    if (nearestPred) {
        const pr = nearestPred;
        const types = {'m': 'Mirror', 'c': 'Center', 't': 'Triangle', 'o': 'ModOnly'};
        let pInfo = `${types[pr.tp] || pr.tp}`;
        pInfo += ` A:[${pr.as}-${pr.ae}] ${pr.aps}->${pr.ape}`;
        pInfo += ` Pred:${pr.psp.toFixed(5)}->${pr.ptp.toFixed(5)} t=${pr.pt}`;
        pInfo += ` sc=${pr.sc} prog=${(pr.prog*100).toFixed(0)}%`;
        if (pr.tp === 't') pInfo += ` ${pr.st === 'c' ? 'Conv' : 'Div'} r=${pr.ar ? pr.ar.toFixed(2) : '?'}`;
        if (pr.tp === 'o') pInfo += ` mod_sym=${pr.ms ? pr.ms.toFixed(2) : '?'}`;
        info += ` | ${pInfo}`;
    }
    
    // Nearest pool segment
    let nearestSeg = null, nearestSegDist = Infinity;
    if (showFus && d.pool) {
        for (const s of d.pool) {
            const cx1 = (lastXS(s.bs) + lastXS(s.be)) / 2;
            const cy1 = (lastYS(s.ps) + lastYS(s.pe)) / 2;
            const dx = cx1 - mx, dy = cy1 - my;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < nearestSegDist && dist < 30) {
                nearestSegDist = dist;
                nearestSeg = s;
            }
        }
    }
    if (nearestSeg) {
        const s = nearestSeg;
        const srcNames = {'b': 'base', 'a': 'amp', 'l': 'lat', 'f': 'fusion', 'e': 'extra'};
        info += ` | Seg: [${s.bs}-${s.be}] ${s.ps}->${s.pe} src=${srcNames[s.src] || s.src} imp=${s.imp}`;
    }
    
    hoverInfo = info;
    updateInfoBar(d);
}

function onCanvasMouseLeave() {
    hoverInfo = '';
    if (curData) updateInfoBar(curData);
}

// ============================================================
// Init
// ============================================================
window.addEventListener('resize', draw);
document.getElementById('mainCanvas').addEventListener('mousemove', onCanvasMouseMove);
document.getElementById('mainCanvas').addEventListener('mouseleave', onCanvasMouseLeave);

// Connect
connectWS();
</script>
